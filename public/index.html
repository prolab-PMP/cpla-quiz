<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>공인노무사 1차 기출문제 | 노무사 Quiz</title>
  <meta name="description" content="공인노무사 1차 시험 기출문제 2013~2025년 2,130문제 · 키워드 분류 · 모의고사 · O/X · 학습 히트맵">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
  <script>
    // Apply theme before render to avoid flash
    (function(){
      try {
        var t = localStorage.getItem('cpla_theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="app.navigate('home')">
        <span class="logo-mark"><i class="fas fa-balance-scale"></i></span>
        <span>노무사 Quiz</span>
        <span class="tag">v2</span>
      </div>
      <nav class="header-nav" id="headerNav">
        <button onclick="app.navigate('home')" data-page="home"><i class="fas fa-home"></i> 홈</button>
        <button onclick="app.navigate('quiz-setup')" data-page="quiz-setup"><i class="fas fa-pen"></i> 문제풀이</button>
        <button onclick="app.navigate('keywords')" data-page="keywords"><i class="fas fa-tags"></i> 키워드</button>
        <button onclick="app.navigate('wrong-answers')" data-page="wrong-answers"><i class="fas fa-times-circle"></i> 오답노트</button>
        <button onclick="app.navigate('bookmarks')" data-page="bookmarks"><i class="far fa-bookmark"></i> 북마크</button>
        <button onclick="app.navigate('dashboard')" data-page="dashboard"><i class="fas fa-chart-bar"></i> 성적</button>
        <div id="authArea" style="display:flex;gap:6px;align-items:center;"></div>
      </nav>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="메뉴">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <main class="main" id="app"></main>

  <nav class="mobile-bottom-nav">
    <button class="mb-item" data-page="home" onclick="app.navigate('home')"><i class="fas fa-home"></i>홈</button>
    <button class="mb-item" data-page="quiz-setup" onclick="app.navigate('quiz-setup')"><i class="fas fa-pen"></i>풀이</button>
    <button class="mb-item" data-page="keywords" onclick="app.navigate('keywords')"><i class="fas fa-tags"></i>키워드</button>
    <button class="mb-item" data-page="wrong-answers" onclick="app.navigate('wrong-answers')"><i class="fas fa-times-circle"></i>오답</button>
    <button class="mb-item" data-page="dashboard" onclick="app.navigate('dashboard')"><i class="fas fa-chart-bar"></i>성적</button>
  </nav>

  <div id="toastContainer"></div>
  <script src="/js/app.js"></script>
</body>
</html>
