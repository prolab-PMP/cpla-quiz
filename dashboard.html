<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습통계 · 오답노트 · 공인노무사</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="공인노무사 학습통계 및 오답노트. 과목별/연도별 정답률 분석, 취약점 파악, 학습 진도율 추적.">
<meta name="keywords" content="학습통계, 오답노트, 정답률, 과목별분석, 연도별분석, 학습대시보드">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://cpla.wayexam.com/dashboard.html">
<meta property="og:title" content="학습통계 · 오답노트 · 공인노무사">
<meta property="og:description" content="개인별 학습 진도 및 통계 분석">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cpla.wayexam.com/dashboard.html">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="학습통계 · 오답노트 · 공인노무사">
<meta name="twitter:description" content="개인별 학습 진도 및 통계 분석">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "공인노무사 학습통계",
  "url": "https://cpla.wayexam.com/dashboard.html",
  "description": "학습 진도, 정답률 분석, 오답 관리",
  "applicationCategory": "EducationalApplication"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "공인노무사 기출문제 풀이",
  "url": "https://cpla.wayexam.com/",
  "description": "공인노무사 1차 자격시험 기출문제 풀이 및 학습 플랫폼",
  "inLanguage": "ko"
}
</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="images/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="공인노무사">
</head>
<body>
<script src="data/problems.js"></script>
<script src="js/common.js"></script>
<script>CPLA.renderHeader('dashboard');</script>

<main class="container">
  <div class="hero" style="padding:30px 32px">
    <h1 style="font-size:26px">📊 학습통계 · 오답노트</h1>
    <p>풀이 기록을 기반으로 과목·연도·키워드별 취약점을 분석합니다. 오른쪽 탭으로 오답노트와 북마크를 확인하세요.</p>
  </div>

  <!-- 요약 -->
  <div class="grid cols-4" id="summary-cards"></div>

  <section class="section-title"><span class="tag">분석</span> 차트</section>
  <div class="grid cols-2">
    <div class="chart-box"><h4>과목별 정답률</h4><div class="wrap"><canvas id="chart-subject"></canvas></div></div>
    <div class="chart-box"><h4>연도별 정답률</h4><div class="wrap"><canvas id="chart-year"></canvas></div></div>
    <div class="chart-box"><h4>출제 유형 분포</h4><div class="wrap"><canvas id="chart-form"></canvas></div></div>
    <div class="chart-box"><h4>취약 키워드 TOP 10 (오답 많은 순)</h4><div class="wrap"><canvas id="chart-kw"></canvas></div></div>
  </div>

  <section class="section-title"><span class="tag">노트</span> 틀린 문제 · 북마크</section>
  <div class="tabs">
    <button class="tab-btn active" data-tab="wrong">❌ 오답노트</button>
    <button class="tab-btn" data-tab="bookmark">⭐ 북마크</button>
    <button class="tab-btn" data-tab="recent">🕒 최근 풀이</button>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button class="btn sm" id="btn-export" title="풀이 기록을 JSON 파일로 내려받기">⬇️ 내보내기</button>
      <button class="btn sm" id="btn-import" title="다른 기기에서 내보낸 JSON 불러오기">⬆️ 가져오기</button>
      <input type="file" id="file-import" accept="application/json,.json" style="display:none">
      <button class="btn sm danger" id="btn-reset-all">전체 기록 초기화</button>
    </div>
  </div>
  <div id="tab-body"></div>
</main>

<script>
const ps = CPLA.getProblems();
const state = CPLA.loadState();

// 요약 카드
const totalStats = CPLA.calcStats(ps);
document.getElementById('summary-cards').innerHTML = `
  <div class="card"><div class="icon-badge ib-blue">📘</div>
    <h3>${totalStats.solved}<span style="font-size:14px;color:var(--muted);margin-left:4px">/ ${totalStats.total}</span></h3>
    <p class="desc">푼 문제 · 진도 ${totalStats.progress}%</p>
    <div class="progress"><i style="width:${totalStats.progress}%"></i></div></div>
  <div class="card"><div class="icon-badge ib-green">✅</div>
    <h3>${totalStats.accuracy}%</h3><p class="desc">정답률 (${totalStats.correct}/${totalStats.solved})</p></div>
  <div class="card"><div class="icon-badge ib-danger">❌</div>
    <h3>${totalStats.wrong}</h3><p class="desc">오답 수</p></div>
  <div class="card"><div class="icon-badge ib-purple">⭐</div>
    <h3>${totalStats.bookmark}</h3><p class="desc">북마크</p></div>
`;

// ---- 차트 준비 ----
Chart.defaults.font.family = "-apple-system,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif";
Chart.defaults.font.size = 12;

// 과목별
const subjects = [...new Set(ps.map(p=>p.subject))];
const subjectData = subjects.map(s => {
  const list = ps.filter(p=>p.subject===s);
  const stats = CPLA.calcStats(list);
  return {subject:s, ...stats};
});
new Chart(document.getElementById('chart-subject'), {
  type:'bar',
  data:{
    labels: subjectData.map(d=>d.subject),
    datasets:[
      {label:'정답', data:subjectData.map(d=>d.correct), backgroundColor:'#16a34a'},
      {label:'오답', data:subjectData.map(d=>d.wrong), backgroundColor:'#dc2626'},
      {label:'미풀이', data:subjectData.map(d=>d.total-d.solved), backgroundColor:'#cbd5e1'},
    ]
  },
  options:{
    maintainAspectRatio:false,
    responsive:true,
    scales:{x:{stacked:true},y:{stacked:true}},
    plugins:{legend:{position:'bottom'}}
  }
});

// 연도별 정답률
const years = [...new Set(ps.map(p=>p.year))].sort();
const yearData = years.map(y => {
  const list = ps.filter(p=>p.year===y);
  const stats = CPLA.calcStats(list);
  return {year:y, ...stats};
});
new Chart(document.getElementById('chart-year'), {
  type:'line',
  data:{
    labels: yearData.map(d=>d.year),
    datasets:[{
      label:'정답률(%)', data:yearData.map(d=>d.accuracy),
      borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.15)',
      fill:true, tension:.3, pointRadius:4, pointHoverRadius:6
    }]
  },
  options:{
    maintainAspectRatio:false,
    scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}}},
    plugins:{legend:{display:false}}
  }
});

// 유형 (계산형/서술형)
const formCnt = {};
ps.forEach(p => { const k = p.form || '기타'; formCnt[k] = (formCnt[k]||0)+1; });
new Chart(document.getElementById('chart-form'), {
  type:'doughnut',
  data:{
    labels: Object.keys(formCnt),
    datasets:[{data:Object.values(formCnt), backgroundColor:['#2563eb','#7c3aed','#16a34a','#d97706','#64748b']}]
  },
  options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}
});

// 취약 키워드 (오답 기준). 데이터 없으면 출제 많은 키워드로 폴백.
const kwWrong = {};
const kwAll = {};
ps.forEach(p => {
  const a = state.attempts[p.key];
  (p.keywords||[]).forEach(k => {
    kwAll[k] = (kwAll[k]||0)+1;
    if(a && !a.correct) kwWrong[k] = (kwWrong[k]||0)+1;
  });
});
const hasWrongData = Object.keys(kwWrong).length > 0;
const topKw = Object.entries(hasWrongData ? kwWrong : kwAll)
  .sort((a,b)=>b[1]-a[1]).slice(0,10);
new Chart(document.getElementById('chart-kw'), {
  type:'bar',
  data:{
    labels: topKw.map(x=>x[0]),
    datasets:[{
      label: hasWrongData ? '오답 수' : '출제 수(기본)',
      data: topKw.map(x=>x[1]),
      backgroundColor: hasWrongData ? '#dc2626' : '#2563eb'
    }]
  },
  options:{
    indexAxis:'y', maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{x:{beginAtZero:true, ticks:{stepSize:1}}}
  }
});

// ---- 탭 ----
let currentTab = 'wrong';
function renderTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  const s = CPLA.loadState();
  let rows = [];
  if(tab === 'wrong'){
    rows = ps.filter(p => s.attempts[p.key] && !s.attempts[p.key].correct);
  }else if(tab === 'bookmark'){
    rows = ps.filter(p => s.bookmarks[p.key]);
  }else if(tab === 'recent'){
    rows = ps.filter(p => s.attempts[p.key]);
    rows.sort((a,b)=> (s.attempts[b.key].ts||0) - (s.attempts[a.key].ts||0));
    rows = rows.slice(0, 50);
  }
  // 정렬 적용 (wrong/bookmark만 — recent는 이미 ts desc)
  if (tab === 'wrong' || tab === 'bookmark') {
    const kind = tab === 'wrong' ? 'review' : 'fav';
    const pref = CPLA.getSortPref()[kind] || 'added';
    rows = CPLA.sortProblems(rows, pref);
  }
  if(rows.length === 0){
    document.getElementById('tab-body').innerHTML = `
      <div class="empty"><div class="big">🗒️</div>
        <h3>${tab==='wrong'?'오답으로 기록된 문제가 없습니다':'항목이 없습니다'}</h3>
        <p>문제를 풀고 다시 오면 여기에 표시됩니다.</p></div>`;
    return;
  }
  // 정렬 탭 UI (wrong/bookmark만)
  let sortBar = '';
  if (tab === 'wrong' || tab === 'bookmark') {
    const kind = tab === 'wrong' ? 'review' : 'fav';
    const cur = CPLA.getSortPref()[kind] || 'added';
    sortBar = `
      <div style="margin:0 0 12px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px">
        정렬:
        <span class="sort-tabs">
          <button class="sort-tab ${cur==='added'?'active':''}" data-sort="added">저장순</button>
          <button class="sort-tab ${cur==='numAsc'?'active':''}" data-sort="numAsc">번호순</button>
          <button class="sort-tab ${cur==='recent'?'active':''}" data-sort="recent">최근순</button>
        </span>
        <span style="margin-left:auto">${rows.length}건</span>
      </div>`;
  }

  const html = sortBar + `<table class="table">
    <thead><tr>
      <th style="width:90px">연도</th>
      <th style="width:140px">과목</th>
      <th style="width:60px">번호</th>
      <th>문제</th>
      <th style="width:110px">상태</th>
      <th style="width:90px">정답</th>
    </tr></thead>
    <tbody>
      ${rows.map(p => {
        const a = s.attempts[p.key];
        const bk = s.bookmarks[p.key];
        let status = '-';
        if(a) status = a.correct ? '<span class="chip green">정답</span>' : `<span class="chip danger">오답(${a.answer}번)</span>`;
        if(bk) status += ' <span class="chip purple">★</span>';
        const ans = p.answer===12345 ? '전항' : p.answer+'번';
        const text = (p.question||'').replace(/^\d+\.\s*/,'').slice(0,70);
        return `<tr onclick="location.href='exam.html?mode=year&year=${p.year}&q=${encodeURIComponent(p.key)}'">
          <td>${p.year}년</td>
          <td>${p.subject}</td>
          <td>${p.num}</td>
          <td>${escapeHtml(text)}${text.length>=70?'…':''}</td>
          <td>${status}</td>
          <td><b>${ans}</b></td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
  document.getElementById('tab-body').innerHTML = html;
  // Sort tab clicks
  document.querySelectorAll('.sort-tab').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const mode = btn.dataset.sort;
      const kind = currentTab === 'wrong' ? 'review' : 'fav';
      CPLA.setSortPref(kind, mode);
      renderTab(currentTab);
    };
  });
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => renderTab(b.dataset.tab));
renderTab('wrong');

document.getElementById('btn-reset-all').onclick = () => {
  if(!confirm('모든 풀이 기록과 북마크를 삭제할까요? 되돌릴 수 없습니다.')) return;
  CPLA.resetAll();
  location.reload();
};

// 내보내기 / 가져오기
document.getElementById('btn-export').onclick = () => CPLA.exportState();
document.getElementById('btn-import').onclick = () => document.getElementById('file-import').click();
document.getElementById('file-import').addEventListener('change', (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  CPLA.importState(f, (ok) => { if (ok) setTimeout(() => location.reload(), 800); });
  ev.target.value = '';
});
</script>
<script>CPLA.renderFooter();</script>
</body>
</html>
