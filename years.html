  "description": "공인노무사 1차 자격시험 기출문제 풀이 및 학습 플랫폼",

<body>
<script src="data/problems.js"></script>
<script src="js/common.js"></script>
<script>CPLA.renderHeader('years');</script>

<main class="container">
  <div class="hero" style="padding:30px 32px">
    <h1 style="font-size:26px">📅 연도별 기출문제 풀이</h1>
    <p>원하는 연도를 선택하여 해당 회차 75문항을 풀어보세요. 각 카드에는 나의 진도율과 정답률이 표시됩니다.</p>
  </div>

  <div class="grid cols-4" id="year-grid"></div>
</main>

<script>
  const ps = CPLA.getProblems();
  const byYear = {};
  ps.forEach(p => { (byYear[p.year] = byYear[p.year] || []).push(p); });
  const years = Object.keys(byYear).sort((a,b)=>b.localeCompare(a));
  const state = CPLA.loadState();
  const titleOf = {
    "2013":"제3회","2014":"제4회","2015":"제5회","2016":"제6회",
    "2017":"제7회","2018":"제8회","2019":"제9회","2020":"제10회",
    "2021":"제11회","2022":"제12회","2023":"제32회","2024":"제33회","2025":"제34회"
  };
  const grid = document.getElementById('year-grid');
  grid.innerHTML = years.map(y => {
    const list = byYear[y];
    const stats = CPLA.calcStats(list);
    return `
      <a class="card link" href="exam.html?mode=year&year=${y}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <h3>${y}년 <span class="chip blue" style="margin-left:4px">${titleOf[y]||''}</span></h3>
            <p class="desc">총 ${list.length}문항 · ${list.filter(p=>p.form==='계산형').length}개 계산형</p>
          </div>
          <div class="icon-badge ib-blue">📝</div>
        </div>
        <div class="stat">
          <span class="stat-small">진도 ${stats.solved}/${stats.total}</span>
          <span class="stat-big">${stats.accuracy || 0}%</span>
        </div>
        <div class="progress"><i style="width:${stats.progress}%"></i></div>
      </a>`;
  }).join('');
</script>
<script>CPLA.renderFooter();</script>
</body>
</html>
